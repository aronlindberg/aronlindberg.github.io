<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 540" width="880" height="540">
  <defs>
    <style>text { font-family: 'DM Sans', sans-serif; }</style>

    <!-- Standard arrowhead (marker-end, points forward) -->
    <marker id="ah" viewBox="0 0 10 10" refX="9" refY="5"
            markerUnits="strokeWidth" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M0,1 L9,5 L0,9 Z" fill="#0e1117"/>
    </marker>
    <!-- Reverse arrowhead (marker-start, points backward along path) -->
    <marker id="ah-rev" viewBox="0 0 10 10" refX="1" refY="5"
            markerUnits="strokeWidth" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M0,1 L9,5 L0,9 Z" fill="#0e1117"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="880" height="540" fill="transparent"/>

  <!-- Title — no underline -->
  <text x="310" y="32" font-size="20" font-weight="600" fill="#0e1117" text-anchor="middle">Agentic Design System</text>

  <!-- Dashed system boundary -->
  <rect x="28" y="52" width="590" height="476" rx="10" fill="none"
        stroke="#aaa" stroke-width="1.5" stroke-dasharray="9,5"/>

  <!-- =================================================== -->
  <!-- ARROWS — endpoints sit in open space between nodes  -->
  <!-- so both arrowheads are fully visible                -->
  <!-- =================================================== -->

  <!-- Context Architecture ↔ Crit Agents -->
  <line x1="258" y1="197" x2="184" y2="270"
        stroke="#0e1117" stroke-width="1.5"
        marker-start="url(#ah-rev)" marker-end="url(#ah)"/>

  <!-- Context Architecture ↔ Design Agents -->
  <line x1="342" y1="197" x2="416" y2="270"
        stroke="#0e1117" stroke-width="1.5"
        marker-start="url(#ah-rev)" marker-end="url(#ah)"/>

  <!-- Crit Agents ↔ Design Agents -->
  <line x1="232" y1="307" x2="374" y2="307"
        stroke="#0e1117" stroke-width="1.5"
        marker-start="url(#ah-rev)" marker-end="url(#ah)"/>

  <!-- Crit Agents ↔ Eval Artifacts -->
  <line x1="184" y1="350" x2="207" y2="412"
        stroke="#0e1117" stroke-width="1.5"
        marker-start="url(#ah-rev)" marker-end="url(#ah)"/>

  <!-- Design Agents ↔ Eval Artifacts -->
  <line x1="416" y1="350" x2="393" y2="412"
        stroke="#0e1117" stroke-width="1.5"
        marker-start="url(#ah-rev)" marker-end="url(#ah)"/>

  <!-- Context Architecture ↔ Eval Artifacts (centre, slightly offset) -->
  <line x1="294" y1="212" x2="294" y2="402"
        stroke="#0e1117" stroke-width="1.5"
        marker-start="url(#ah-rev)" marker-end="url(#ah)"/>

  <!-- =================================================== -->
  <!-- ELLIPSE NODES (drawn over arrows)                   -->
  <!-- =================================================== -->

  <!-- Context Architecture — GREEN -->
  <ellipse cx="300" cy="157" rx="118" ry="46" fill="#f0f7ee" stroke="#3a7a4a" stroke-width="2"/>
  <text x="300" y="151" font-size="13.5" font-weight="600" fill="#2a5a3a" text-anchor="middle">Context</text>
  <text x="300" y="169" font-size="13.5" font-weight="600" fill="#2a5a3a" text-anchor="middle">Architecture</text>

  <!-- Crit Agents — BLUE -->
  <ellipse cx="138" cy="307" rx="92" ry="46" fill="#e8f0fb" stroke="#1a3a6b" stroke-width="2"/>
  <text x="138" y="301" font-size="13.5" font-weight="600" fill="#1a3a6b" text-anchor="middle">Crit</text>
  <text x="138" y="319" font-size="13.5" font-weight="600" fill="#1a3a6b" text-anchor="middle">Agents</text>

  <!-- Design Agents — BLUE -->
  <ellipse cx="468" cy="307" rx="92" ry="46" fill="#e8f0fb" stroke="#1a3a6b" stroke-width="2"/>
  <text x="468" y="301" font-size="13.5" font-weight="600" fill="#1a3a6b" text-anchor="middle">Design</text>
  <text x="468" y="319" font-size="13.5" font-weight="600" fill="#1a3a6b" text-anchor="middle">Agents</text>

  <!-- Eval Artifacts — GREEN -->
  <ellipse cx="300" cy="455" rx="118" ry="46" fill="#f0f7ee" stroke="#3a7a4a" stroke-width="2"/>
  <text x="300" y="449" font-size="13.5" font-weight="600" fill="#2a5a3a" text-anchor="middle">Eval</text>
  <text x="300" y="467" font-size="13.5" font-weight="600" fill="#2a5a3a" text-anchor="middle">Artifacts</text>

  <!-- =================================================== -->
  <!-- HUMAN DESIGNER — ORANGE, two single arrows          -->
  <!-- =================================================== -->

  <!-- System → Human Designer (upper arrow, rightward) -->
  <line x1="564" y1="293" x2="648" y2="293"
        stroke="#0e1117" stroke-width="1.5"
        marker-end="url(#ah)"/>

  <!-- Human Designer → System (lower arrow, leftward) -->
  <line x1="648" y1="320" x2="564" y2="320"
        stroke="#0e1117" stroke-width="1.5"
        marker-end="url(#ah)"/>

  <!-- Human Designer box — ORANGE -->
  <rect x="650" y="263" width="164" height="100" rx="5"
        fill="#fdf0e8" stroke="#c0682b" stroke-width="2"/>
  <text x="732" y="306" font-size="14" font-weight="600" fill="#7a3010" text-anchor="middle">Human</text>
  <text x="732" y="326" font-size="14" font-weight="600" fill="#7a3010" text-anchor="middle">Designer</text>

</svg>
